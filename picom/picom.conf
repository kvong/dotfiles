# ==============================================================================
# Picom Configuration — Eye-pleasing & Productivity Focused
# ==============================================================================

##############################
#     Backend & Rendering    #
##############################

# Use glx backend for better performance with effects (shadows, blur, etc.)
# If you run into issues (NVIDIA), fall back to "xrender".
backend = "glx";

# Enable VSync to prevent screen tearing
vsync = true;

# Use damage for better performance
use-damage = true;

# Log level: "trace", "debug", "info", "warn", "error"
log-level = "warn";

##############################
#    Shadows — Soft & Clean  #
##############################

shadow = true;
shadow-radius = 12;
shadow-offset-x = -8;
shadow-offset-y = -8;
shadow-opacity = 0.4;

# Use a list with colors for a subtle colored shadow (default is black)
shadow-red = 0.0;
shadow-green = 0.0;
shadow-blue = 0.0;

shadow-exclude = [
  "name = 'Notification'",
  "class_g = 'Conky'",
  "class_g = 'Bar'",
  "class_g ?= 'Notify'",
  "class_g ?= 'Cairo-clock'",
  "_GTK_FRAME_EXTENTS@",
  # Exclude docks and panels (plasma, polybar, etc.)
  "window_type = 'dock'",
  "window_type = 'desktop'",
  # Exclude dropdown/overlay windows (rofi, dmenu)
  "class_g = 'Rofi'",
  "class_g = 'Dmenu'",
  # Exclude floating/tooltip windows
  "class_g = 'Firefox' && argb",
  # Exclude focused window from shadow if you prefer cleaner look
  #"focused: 1",
];

##############################
#    Fading — Smooth UX      #
##############################

fading = true;
fade-in-step = 0.03;
fade-out-step = 0.03;
fade-delta = 4;

# No fade for certain windows
fade-exclude = [
  "window_type = 'dock'",
  "window_type = 'desktop'",
];

##############################
#   Transparency & Opacity   #
##############################

# Inactive window dimming — helps focus on the active window
inactive-opacity = 0.92;
inactive-opacity-override = false;

# Active windows stay fully opaque
active-opacity = 1.0;

# Frame opacity — keep window frames slightly more visible
frame-opacity = 0.85;

# Opacity rules: [OPACITY:TYPE:CLASS:ID]
# TYPE: 0 = window, 1 = client, 2 = both
opacity-rule = [
  # Terminal emulators — slightly transparent for layering
  "90:class_g = 'Alacritty'",
  "90:class_g = 'Kitty'",
  "90:class_g = 'Urxvt'",
  "90:class_g = 'st-256color'",
  "90:class_g = 'XTerm'",
  "90:class_g = 'Termite'",
  "90:class_g = 'termite'",

  # Code editors — keep fully opaque for readability
  "100:class_g = 'Code'",
  "100:class_g = 'code-oss'",
  "100:class_g = 'Code - OSS'",
  "100:class_g = 'jetbrains-idea'",
  "100:class_g = 'jetbrains-clion'",
  "100:class_g = 'Sublime_text'",

  # Browsers — mostly opaque
  "100:class_g = 'Firefox'",
  "100:class_g = 'Chromium'",
  "100:class_g = 'Google-chrome'",
  "100:class_g = 'Brave-browser'",

  # File managers
  "95:class_g = 'Thunar'",
  "95:class_g = 'Nautilus'",
  "95:class_g = 'Nemo'",
  "95:class_g = 'Dolphin'",
  "95:class_g = 'pcmanfm'",

  # Floating/overlay windows — semi-transparent
  "80:class_g = 'Rofi'",
  "80:class_g = 'Dmenu'",
  "80:class_g = 'dunst'",
  "80:class_g = 'Dunst'",
  "85:class_g = 'Xfce4-notifyd'",
  "85:class_g = 'Notify-osd'",
];

##############################
#    Blur — Modern Aesthetic #
##############################

# Blur method: "gaussian", "box", or "kernel" ("kawase" not available in picom v13)
blur-method = "gaussian";
blur-size = 10;
blur-deviation = 5.0;

# Blur the background of transparent/semi-transparent windows
blur-background = true;
blur-background-frame = false;
blur-background-fixed = false;

# Exclude certain windows from blur
blur-background-exclude = [
  "window_type = 'dock'",
  "window_type = 'desktop'",
  "class_g = 'systray'",
  "class_g = 'dwmsystray'",
  # Exclude fullscreen windows from blur for performance
  "_NET_WM_STATE@ *= '_NET_WM_STATE_FULLSCREEN'",
  # Don't blur on overlay/dnd windows
  "window_type = 'dnd'",
  "window_type = 'menu'",
  "window_type = 'popup_menu'",
  "window_type = 'dropdown_menu'",
];

##############################
#   Rounded Corners — Polish #
##############################

corner-radius = 8;

# Exclude certain window types from rounding
rounded-corners-exclude = [
  "window_type = 'dock'",
  "window_type = 'desktop'",
  "window_type = 'menu'",
  "window_type = 'popup_menu'",
  "window_type = 'dropdown_menu'",
  "window_type = 'tooltip'",
  "class_g = 'Rofi'",
  "class_g = 'Dmenu'",
  "_GTK_FRAME_EXTENTS@",
];

# Try to detect rounded corners from the client window itself
detect-rounded-corners = true;

##############################
#    Window Matching Flags   #
##############################

# Mark window managers with _NET_WM_WINDOW_OPACITY as focused
mark-wmwin-focused = true;

# Mark override-redirect windows as focused (dmenu, rofi, etc.)
mark-ovredir-focused = true;

# Detect _NET_WM_WINDOW_OPACITY changes
detect-client-opacity = true;

# Detect and respect transient windows (dialogs)
detect-transient = true;

# Wait for leader window mapping before mapping transient windows
detect-client-leader = true;

##############################
#   Animation / Smoothing    #
##############################

# Use GLX copy sub-buffer for smoother rendering
glx-copy-from-front = true;

# Unredirect fullscreen windows for better performance
unredir-if-possible = true;
unredir-if-possible-delay = 0;

# Focused window gets pushed to top in the composition chain
focus-exclude = [
  "class_g = 'Rofi'",
  "class_g = 'Dmenu'",
];

##############################
#   Per-Window-Type Config   #
##############################

wintypes:
{
  # Tooltips
  tooltip:
  {
    fade = true;
    shadow = true;
    opacity = 0.85;
    focus = true;
    full-shadow = false;
  };

  # Docks and panels
  dock:
  {
    shadow = false;
    clip-shadow-above = true;
    opacity = 1.0;
  };

  # Drag and drop
  dnd:
  {
    shadow = false;
    opacity = 0.85;
  };

  # Regular popup menus
  popup_menu:
  {
    opacity = 0.92;
    shadow = true;
  };

  # Dropdown menus
  dropdown_menu:
  {
    opacity = 0.92;
    shadow = true;
  };

  # Desktop
  desktop:
  {
    shadow = false;
    fade = false;
  };

  # Notification windows
  notification:
  {
    opacity = 0.90;
    fade = true;
    shadow = true;
  };

  # Modal dialogs
  dialog:
  {
    opacity = 1.0;
    shadow = true;
  };

  # Splash screens
  splash:
  {
    opacity = 0.85;
    shadow = false;
  };
};

##############################
#     Performance Tweaks     #
##############################

# Use damage tracking for redraw efficiency
# "none", "monitor", "whole", "region"
damage-track = "region";

# Sync with X Present extension for smoother rendering
xrender-sync-fence = true;

# Use the GLX swap interval extension
glx-swap-method = "undefined";

##############################
#   Experimental / Optional  #
##############################

# Force window paint all the time (can fix repaint issues)
# paint-on-overlay = true;
